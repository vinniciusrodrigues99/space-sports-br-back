name: Keep Render Service Alive

on:
  schedule:
    # Roda a cada 13 minutos
    - cron: '*/6 * * * *'
  workflow_dispatch:

jobs:
  ping-server:
    runs-on: ubuntu-latest

    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 90 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            "${{ secrets.RENDER_APP_URL }}/api/health")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check falhou com status $STATUS"
            exit 1
          fi
